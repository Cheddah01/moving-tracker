name = "move-tracker-api"
main = "worker.js"
compatibility_date = "2024-01-01"

# After creating the KV namespace, replace <YOUR_KV_ID> with the actual ID:
#   npx wrangler kv namespace create MOVE_DATA
# Then paste the id below.

[[kv_namespaces]]
binding = "MOVE_DATA"
id = "<YOUR_KV_ID>"

# Set your auth token as a secret (don't put it here):
#   npx wrangler secret put AUTH_TOKEN
# It will prompt you to enter your password.
